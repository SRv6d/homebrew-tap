---
name: Update Casks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Homebrew/actions/setup-homebrew@main
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b

      - name: Check for updates and bump outdated casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just bump-all

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update cask definitions"
          branch: "automation/update-casks"
          delete-branch: true
          title: "Update cask definitions"
          body: |
            This PR was created automatically by the weekly cask update workflow.
            It runs Homebrew livecheck and updates outdated casks using bump-cask-pr.
